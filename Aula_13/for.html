<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repetiçaõ for</title>
    <style>
        table {
            border-collapse: collapse;
        }
        tr, td {
            border: 1px solid black;
            padding: 5px;
        }
    </style>
    
</head>
<body>
    <script>
        cont = 0;
        let produto = ["Computador", "Home Theater", "Lava e Seca"];
        document.write("<table>");
            for(let linha = 0; linha < 3; linha++) {
                document.write("<tr>");
                    for(let coluna = 0; coluna < 3; coluna++) {
                        document.write("<td>");
                        document.write(produto[coluna]);
                        document.write("</td>");
                    }
                document.write("</tr>");
            }
    </script>
</body>
</html>
